name: Generate timetable JSON

on:
  push:
    paths:
      - data/timetable-source.csv
      - data/timetable-metadata.json
      - scripts/generate-timetable.mjs
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: timetable-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run timetable:generate
      - run: npm run timetable:check
      - run: npm run lint
      - run: npm run build
      - name: Commit generated JSON
        shell: bash
        run: |
          if git diff --quiet -- src/data/timetable.json; then
            echo "Generated JSON is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/timetable.json
          git commit -m "chore: regenerate timetable JSON"
          git push origin "HEAD:${GITHUB_REF_NAME}"
