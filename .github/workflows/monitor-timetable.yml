name: Monitor JR Hokkaido timetable revision

on:
  schedule:
    - cron: "17 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Scan official news releases
        run: node scripts/scan-jr-news.mjs > timetable-news.json
      - name: Create issues for new announcements
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const announcements = JSON.parse(fs.readFileSync('timetable-news.json', 'utf8'))
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: 'timetable-update' })
            } catch (error) {
              if (error.status !== 404) throw error
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'timetable-update',
                color: '0f766e',
                description: 'JR北海道のダイヤ確認・更新',
              })
            }
            for (const announcement of announcements) {
              const query = `repo:${context.repo.owner}/${context.repo.repo} label:timetable-update in:body "${announcement.url}"`
              const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 })
              if (existing.data.total_count > 0) continue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[ダイヤ更新確認] ${announcement.title}`,
                labels: ['timetable-update'],
                body: [
                  'JR北海道のニュースリリースで次回ダイヤ改正の発表を検知しました。',
                  '',
                  `- 公式発表: ${announcement.url}`,
                  `- 監視ページ: ${announcement.checkedPage}`,
                  '',
                  '## 次に行うこと',
                  '',
                  '- [ ] `docs/TIMETABLE_UPDATE.md` を開く',
                  '- [ ] 改正日以後の日付で公式時刻を確認する',
                  '- [ ] `data/timetable-source.csv` を更新ブランチで編集する',
                  '- [ ] `data/timetable-metadata.json` の適用日・確認日を更新する',
                  '- [ ] 自動生成・検査が緑になることを確認する',
                  '- [ ] 代表4区間を目視確認してからマージする',
                ].join('\n'),
              })
            }
